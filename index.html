<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Cabutan 1-12</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f7f6; }
        .container { background: white; padding: 25px; border-radius: 10px; width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        #result { margin-top: 15px; padding: 15px; display: none; text-align: center; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daftar Giliran</h2>
    <input type="text" id="nama" placeholder="Nama Penuh" required>
    <input type="text" id="tel" placeholder="No Telefon" required>
    <select id="bayaran">
        <option value="100">RM 100</option>
        <option value="200">RM 200</option>
    </select>
    <button id="submitBtn" onclick="hantar()">Cabut Nombor Giliran</button>
    <div id="result"></div>
</div>

<script>
    async function hantar() {
        const btn = document.getElementById('submitBtn');
        const resDiv = document.getElementById('result');
        const data = {
            nama: document.getElementById('nama').value,
            tel: document.getElementById('tel').value,
            bayaran: document.getElementById('bayaran').value
        };

        if(!data.nama || !data.tel) { 
            resDiv.style.display = "block"; resDiv.className = "error"; resDiv.innerText = "Sila isi nama & telefon!"; return; 
        }

        btn.disabled = true; btn.innerText = "Memproses...";
        
        const URL = "https://script.google.com/macros/s/AKfycbxEqNrRBnOrfO5c4XSewUJK_4gheeSvbsZpq_V_wGWPoS1hw0w06nbNcSRVcANFiPVyTw/exec";

        try {
            const response = await fetch(URL, { method: "POST", mode: "cors", body: JSON.stringify(data) });
            const res = await response.json();

            if(res.status === 'success') {
                resDiv.style.display = "block"; resDiv.className = "success";
                resDiv.innerHTML = "<strong>Pendaftaran Berjaya!</strong><br><br>No Giliran Anda:<h1 style='margin:10px 0; font-size: 3em;'>" + res.noGiliran + "</h1>";
            } else {
                resDiv.style.display = "block"; resDiv.className = "error"; resDiv.innerText = res.message;
            }
        } catch (error) {
            resDiv.style.display = "block"; resDiv.className = "error"; resDiv.innerText = "Ralat: Pastikan anda sudah 'Deploy' New Version.";
        } finally {
            btn.disabled = false; btn.innerText = "Cabut Nombor Giliran";
        }
    }
</script>
</body>
</html>
