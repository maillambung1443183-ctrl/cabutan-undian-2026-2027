<!DOCTYPE html>
<html>
<body>
    <input type="text" id="nama" placeholder="Nama">
    <input type="text" id="tel" placeholder="No Tel">
    <button onclick="hantar()">Cabut</button>
    <div id="hasil" style="margin-top:20px; font-weight:bold;"></div>

    <script>
        async function hantar() {
            const nama = document.getElementById('nama').value;
            const data = { nama: nama, tel: document.getElementById('tel').value, bayaran: "100" };
            
            // Papar terus (tak perlu tunggu server)
            document.getElementById('hasil').innerHTML = "Memproses...";
            
            await fetch("https://script.google.com/macros/s/AKfycbyUYKN74qEFoxQal2EidwcDl14y3Zw6joOzjSVtjR5jUWl3qlReu6vdmjBB_q5VeMNwdg/exec", {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });

            // Tunjuk hasil terus
            document.getElementById('hasil').innerHTML = "Pendaftaran Berjaya!<br>Nama: " + nama + "<br>No Giliran: (Sila semak sheet)";
        }
    </script>
</body>
</html>
