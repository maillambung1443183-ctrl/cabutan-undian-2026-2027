<script>
    async function hantar() {
        const btn = document.getElementById('submitBtn');
        const resDiv = document.getElementById('result');
        const data = {
            nama: document.getElementById('nama').value,
            tel: document.getElementById('tel').value,
            bayaran: document.getElementById('bayaran').value
        };

        if(!data.nama || !data.tel) { alert("Sila isi nama!"); return; }

        btn.disabled = true;
        btn.innerText = "Memproses...";
        
        const URL = "https://script.google.com/macros/s/AKfycbx7SmDOjvbeNpKlBiBq0-Dp_i6imqNFkeT3YJM6IOkoYRfOvLju5_ijQ8FO0nLj9dRqog/exec"

        try {
            const response = await fetch(URL, {
                method: "POST",
                mode: "cors",
                body: JSON.stringify(data)
            });

            const res = await response.json();

            if(res.status === 'success') {
                resDiv.className = "success";
                resDiv.innerHTML = "<strong>Pendaftaran Berjaya!</strong><br>No Giliran Anda: <h1>" + res.noGiliran + "</h1>";
            } else {
                resDiv.className = "error";
                resDiv.innerText = res.message;
            }
            resDiv.style.display = "block";
        } catch (error) {
            alert("Ralat: Pastikan anda sudah 'Deploy' versi baru.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Cabut Nombor Giliran";
        }
    }
</script>
