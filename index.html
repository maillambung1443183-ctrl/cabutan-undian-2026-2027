<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Cabutan</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f7f6; }
        .container { background: white; padding: 25px; border-radius: 10px; width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        #result { margin-top: 15px; padding: 15px; display: none; text-align: center; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daftar Giliran</h2>
    <input type="text" id="nama" placeholder="Nama Penuh">
    <input type="text" id="tel" placeholder="No Telefon">
    <select id="bayaran"><option value="100">RM 100</option><option value="200">RM 200</option></select>
    <button id="submitBtn" onclick="hantar()">Cabut Nombor Giliran</button>
    <div id="result"></div>
</div>

<script>
    async function hantar() {
        const btn = document.getElementById('submitBtn');
        const resDiv = document.getElementById('result');
        const data = {
            nama: document.getElementById('nama').value,
            tel: document.getElementById('tel').value,
            bayaran: document.getElementById('bayaran').value
        };

        if(!data.nama || !data.tel) { alert("Sila isi nama dan tel!"); return; }

        btn.disabled = true;
        btn.innerText = "Memproses...";
        
        // URL ANDA SUDAH DIMASUKKAN
        const URL = "https://script.google.com/macros/s/AKfycbwiUgCkYfah8k1yWyf4KXhEiUNJD1-79E1PVzT4pQRn1097Hk4umqHkMkTZfXFLdRyVSA/exec";

        try {
            const response = await fetch(URL, { method: "POST", mode: "cors", body: JSON.stringify(data) });
            const res = await response.json();

            if(res.status === 'success') {
                resDiv.style.display = "block";
                resDiv.className = "success";
                resDiv.innerHTML = "<strong>Pendaftaran Berjaya!</strong><br>No Giliran Anda: <h1>" + res.noGiliran + "</h1>";
            } else {
                alert(res.message);
            }
        } catch (error) {
            console.error(error);
            alert("Ralat! Sila pastikan anda sudah 'Deploy' (New Version) di Google Apps Script.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Cabut Nombor Giliran";
        }
    }
</script>
</body>
</html>
