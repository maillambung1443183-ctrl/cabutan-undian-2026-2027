<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cabutan Undian</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f6; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { text-align: center; color: #333; }
        input, select, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #95a5a6; }
        #hasil { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; border: 2px solid #27ae60; background: #e8f8f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daftar Cabutan</h2>
    <input type="text" id="nama" placeholder="Nama Penuh" required>
    <input type="tel" id="tel" placeholder="No Telefon" required>
    <select id="bayaran">
        <option value="100">RM 100</option>
        <option value="200">RM 200</option>
    </select>
    <button id="btn" onclick="hantar()">Cabut Nombor Giliran</button>
    <div id="hasil"></div>
</div>

<script>
    async function hantar() {
        const btn = document.getElementById('btn');
        const hasil = document.getElementById('hasil');
        const data = {
            nama: document.getElementById('nama').value,
            tel: document.getElementById('tel').value,
            bayaran: document.getElementById('bayaran').value
        };

        if(!data.nama || !data.tel) { alert("Sila isi nama dan telefon!"); return; }

        btn.disabled = true; 
        btn.innerText = "Memproses...";

        try {
            const res = await fetch("https://script.google.com/macros/s/AKfycbxWoFgnidp1rD9QPvFfJRXnESRAeJC0bDEvmTcNkZsH00f61KRC9VBOHnP506qDqwrCPQ/exec", {
                method: "POST",
                mode: "cors",
                body: JSON.stringify(data)
            });
            
            const response = await res.json();

            hasil.style.display = "block";
            if (response.status === 'success') {
                hasil.style.background = "#e8f8f0";
                hasil.style.borderColor = "#27ae60";
                hasil.innerHTML = "<strong>Pendaftaran Berjaya!</strong><br>No Giliran Anda:<h1 style='color:#27ae60; margin:10px 0;'>" + response.no + "</h1>";
            } else {
                hasil.style.background = "#ffe6e6";
                hasil.style.borderColor = "red";
                hasil.innerHTML = "<strong style='color:red;'>" + response.message + "</strong>";
            }
        } catch (error) {
            alert("Ralat sambungan. Sila cuba lagi.");
        } finally {
            btn.disabled = false; 
            btn.innerText = "Cabut Nombor Giliran";
        }
    }
</script>
</body>
</html>
