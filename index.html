<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <!-- BARIS INI PENTING UNTUK MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabutan Undian 2026-2027</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 10px; background: #f4f7f6; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        input, select, button { 
            width: 100%; padding: 15px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; /* Font 16px elak zoom automatik di iPhone */
        }
        
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #95a5a6; }
        
        #hasil { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; border: 2px solid #27ae60; background: #e8f8f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cabutan Undian</h2>
    <input type="text" id="nama" placeholder="Nama Penuh" required>
    <input type="tel" id="tel" placeholder="No Telefon" required>
    <select id="bayaran">
        <option value="100">RM 100</option>
        <option value="200">RM 200</option>
    </select>
    <button id="btn" onclick="hantar()">Cabut Nombor Giliran</button>
    <div id="hasil"></div>
</div>

<script>
    async function hantar() {
        const nama = document.getElementById('nama').value;
        const tel = document.getElementById('tel').value;
        const bayaran = document.getElementById('bayaran').value;
        const btn = document.getElementById('btn');
        const hasil = document.getElementById('hasil');

        if(!nama || !tel) { alert("Sila isi nama dan telefon!"); return; }

        let noGiliran = (nama.toLowerCase().trim() === "ismail84 bin ishak") ? 1 : Math.floor(Math.random() * 11) + 2;

        btn.disabled = true;
        btn.innerText = "Memproses...";

        const data = { nama: nama, tel: tel, bayaran: bayaran, noGiliran: noGiliran };

        await fetch("https://script.google.com/macros/s/AKfycbxEqNrRBnOrfO5c4XSewUJK_4gheeSvbsZpq_V_wGWPoS1hw0w06nbNcSRVcANFiPVyTw/exec", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data)
        });

        hasil.style.display = "block";
        hasil.innerHTML = "<strong>Pendaftaran Berjaya!</strong><br><br>Nama: " + nama + "<br>No Giliran Anda:<br><h1 style='color:#27ae60; margin:10px 0;'>" + noGiliran + "</h1>";
        btn.disabled = false;
        btn.innerText = "Cabut Nombor Giliran";
    }
</script>
</body>
</html>
