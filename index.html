<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cabutan Undian</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #result { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
<div class="container">
    <h2>Cabutan Giliran</h2>
    <input type="text" id="nama" placeholder="Nama Penuh">
    <input type="text" id="tel" placeholder="No Telefon">
    <select id="bayaran"><option value="100">RM 100</option><option value="200">RM 200</option></select>
    <button id="btn" onclick="hantar()">Cabut Nombor Giliran</button>
    <div id="result"></div>
</div>

<script>
    async function hantar() {
        const btn = document.getElementById('btn');
        const resDiv = document.getElementById('result');
        const data = {
            nama: document.getElementById('nama').value,
            tel: document.getElementById('tel').value,
            bayaran: document.getElementById('bayaran').value
        };

        btn.disabled = true;
        btn.innerText = "Memproses...";
        
        // PASTI ANDA MASUKKAN URL DI BAWAH INI
        const URL = "https://script.google.com/macros/s/AKfycbzUU4uBLlF8VsG_Q2MhIWQ6OdlZWYUn404MM6gl78zB1Xp6Yb2X0GqDKuFonTPDWv8p6Q/exec";

        try {
            const response = await fetch(URL, { 
                method: "POST", 
                body: JSON.stringify(data) 
            });
            const res = await response.json();
            
            resDiv.style.display = "block";
            if(res.status === 'success') {
                resDiv.className = "success";
                resDiv.innerHTML = "<strong>Berjaya!</strong><br>No Giliran Anda: <h1>" + res.noGiliran + "</h1>";
            } else {
                resDiv.className = "error";
                resDiv.innerText = res.message;
            }
        } catch (e) {
            alert("Ralat: Pastikan anda telah melakukan 'Deploy' di Apps Script.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Cabut Nombor Giliran";
        }
    }
</script>
</body>
</html>
